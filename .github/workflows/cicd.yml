# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: LeaveSync CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── JOB 1: Lint ──────────────────────────────────
  lint:
    name: Code Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run Lint
        run: flake8 app.py --max-line-length=100 --ignore=E501,W503,E241,E221,E741,W292,F401

  # ── JOB 2: Test ──────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Run Tests with Coverage
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  # ── JOB 3: Docker Build ───────────────────────────
  build:
    name: Docker Build & Health Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t leavesync .

      - name: Run Container
        run: docker run -d -p 5000:5000 --name leavesync-app leavesync

      - name: Wait for app to start
        run: sleep 5

      - name: Health Check
        run: curl --fail http://localhost:5000/health

      - name: Stop Container
        run: docker stop leavesync-app
        
