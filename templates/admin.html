{% extends "base.html" %}
{% block title %}Admin Panel{% endblock %}
{% block content %}

<div class="card">
  <div class="card-title">Pending Approvals ({{ pending|length }})</div>
  <table>
    <thead><tr><th>Employee</th><th>Type</th><th>From</th><th>To</th><th>Days</th><th>Reason</th><th>Action</th></tr></thead>
    <tbody>
      {% for l in pending %}
      <tr>
        <td>{{ l.emp.name }}</td>
        <td>{{ l.type }}</td>
        <td>{{ l.from }}</td>
        <td>{{ l.to }}</td>
        <td>{{ l.days }}</td>
        <td>{{ l.reason }}</td>
        <td style="display:flex;gap:6px">
          <form method="POST" action="/admin/action/{{ l.id }}/approve">
            <button type="submit" class="btn-approve">&#10003; Approve</button>
          </form>
          <form method="POST" action="/admin/action/{{ l.id }}/reject">
            <button type="submit" class="btn-reject">&#10007; Reject</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
