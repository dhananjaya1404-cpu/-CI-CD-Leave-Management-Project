{% extends "base.html" %}
{% block title %}Apply for Leave{% endblock %}
{% block content %}

<div class="card" style="max-width:600px">
  <div class="card-title">Apply for Leave</div>
  <form method="POST">
    <div class="form-grid">
      <div class="form-group">
        <label>Leave Type</label>
        <select name="type">
          <option>Annual</option><option>Sick</option>
          <option>Casual</option><option>Maternity</option><option>Comp Off</option>
        </select>
      </div>
      <div class="form-group">
        <label>Days</label>
        <input type="number" name="days" value="1" min="1"/>
      </div>
      <div class="form-group">
        <label>From Date</label>
        <input type="date" name="from_date" required/>
      </div>
      <div class="form-group">
        <label>To Date</label>
        <input type="date" name="to_date" required/>
      </div>
      <div class="form-group full">
        <label>Reason</label>
        <textarea name="reason" rows="3" placeholder="Brief reason..." required></textarea>
      </div>
    </div>
    <button type="submit" class="btn-primary" style="margin-top:16px">Submit Request</button>
  </form>
</div>

{% endblock %}
